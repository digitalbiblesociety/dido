name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # SAB parity tests need Python aeneas + ffmpeg + espeak on Linux;
      # they Skip cleanly on macOS where aeneas isn't bundled.
      # espeak-ng-espeak provides /usr/bin/espeak (aeneas's default tts).
      - name: Install ffmpeg + espeak (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg espeak-ng espeak-ng-espeak

      # Python 3.11 still ships stdlib distutils (PEP 632 removed it in
      # 3.12), which numpy.distutils — and therefore aeneas's setup.py —
      # depends on.
      - name: Set up Python (Linux)
        if: runner.os == 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python aeneas (Linux)
        if: runner.os == 'Linux'
        env:
          # numpy.distutils calls new_compiler() with a signature that
          # newer setuptools._distutils rejects ("takes 1-3 args, got 4").
          # Force stdlib distutils so numpy's hooks line up.
          SETUPTOOLS_USE_DISTUTILS: stdlib
          # cew is aeneas's C wrapper around libespeak; building it
          # needs libespeak-dev, but the parity tests shell out to the
          # espeak CLI via aeneas's default tts engine and don't load
          # cew. Skip it to avoid the extra apt dep.
          AENEAS_WITH_CEW: "False"
        run: |
          # aeneas 1.7.3 (2017) is built around numpy.distutils, which
          # is only tested up to setuptools<60. Pinning setuptools and
          # wheel here keeps the C extension build (cdtw, cmfcc) on a
          # known-good path. numpy<2 because numpy 2.0 removed
          # numpy.distutils entirely. --no-build-isolation lets
          # aeneas's setup.py see the numpy installed above.
          python -m pip install --upgrade pip
          python -m pip install 'setuptools<60' 'wheel<0.40'
          python -m pip install 'numpy<2'
          python -m pip install --no-build-isolation aeneas
          python -c 'import aeneas, numpy; print("aeneas", aeneas.__version__, "numpy", numpy.__version__)'
          python -c 'import aeneas.cmfcc.cmfcc, aeneas.cdtw.cdtw; print("aeneas C extensions OK")'

      - name: Install ffmpeg + espeak-ng (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg espeak-ng

      - name: Test
        run: go test -count=1 ./...

      # The batch runners fan across goroutines; a plain test run can't see races.
      - name: Test (race detector)
        run: go test -race -count=1 ./...

      # Needs the patched toolchain pinned in go.mod (clears GO-2026-4602).
      - name: govulncheck
        if: runner.os == 'Linux'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
